# Known legitimate MCP server npm packages used for typosquatting detection.
#
# Source: https://github.com/modelcontextprotocol/servers (official registry)
# Each entry is the exact npm package name as published.
# Update this list as the ecosystem grows.
#
# Research basis: typosquatting via minimal edit-distance substitutions is the
# dominant supply-chain attack vector for scoped npm packages.
# Ref: "Typosquatting in Package Managers" — Vu et al., NDSS 2021
#   https://www.ndss-symposium.org/ndss-paper/detecting-node-js-package-name-squatting/

