rules:
  - id: mcp-hardcoded-api-key
    message: >
      Hardcoded credential detected. API keys, secrets, tokens, and passwords
      must not be embedded in source code — use environment variables
      (os.environ.get("MY_API_KEY")) or a secrets manager instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp: MCP09
      description: Hardcoded API key or credential in MCP server source code
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
    patterns:
      - pattern: $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{20,}

  - id: mcp-hardcoded-connection-string
    message: >
      Database connection string with embedded credentials detected.
      Connection strings containing usernames and passwords must not be
      hardcoded — use environment variables or a secrets manager.
    severity: ERROR
    languages: [python]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp: MCP09
      description: Hardcoded database connection string with credentials
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
    pattern-regex: (?i)(postgresql|postgres|mysql|mongodb|redis|mssql)://[^:"'\s]{1,}:[^@"'\s]{1,}@[^"'\s]{3,}
