rules:
  - id: mcp-print-sensitive-var
    message: >
      Sensitive variable printed inside an async function. Printing API keys,
      tokens, passwords, or other credentials exposes them in server logs
      and stdout, where they may be captured by log aggregators.
    severity: WARNING
    languages: [python]
    metadata:
      category: credentials
      cwe: CWE-532
      owasp: A09:2021
      owasp-mcp-top-10:
        - MCP01
      description: Sensitive variable printed in async MCP handler — credential exposure
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
    patterns:
      - pattern: print($X)
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(key|token|secret|password|passwd|auth|credential).*
      - pattern-inside: |
          async def $FUNC(...):
              ...

  - id: mcp-logging-sensitive-var
    message: >
      Sensitive variable passed to a logging call inside an async function.
      Logging API keys, tokens, or passwords exposes credentials in log files
      and log aggregation systems.
    severity: WARNING
    languages: [python]
    metadata:
      category: credentials
      cwe: CWE-532
      owasp: A09:2021
      owasp-mcp-top-10:
        - MCP01
      description: Sensitive variable logged in async MCP handler — credential exposure
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
    patterns:
      - pattern-either:
          - pattern: logging.info($X, ...)
          - pattern: logging.debug($X, ...)
          - pattern: logging.warning($X, ...)
          - pattern: logging.error($X, ...)
          - pattern: $LOGGER.info($X, ...)
          - pattern: $LOGGER.debug($X, ...)
          - pattern: $LOGGER.warning($X, ...)
          - pattern: $LOGGER.error($X, ...)
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(key|token|secret|password|passwd|auth|credential).*
      - pattern-inside: |
          async def $FUNC(...):
              ...
