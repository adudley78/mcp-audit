rules:
  - id: mcp-env-var-not-used
    message: >
      Hardcoded credential value used as a default argument in an MCP tool
      handler function signature. Default argument values are visible in
      source code and stack traces — use os.environ.get("PARAM_NAME") as
      the default or require the value to be injected at construction time.
    severity: WARNING
    languages: [python]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp: MCP09
      description: Hardcoded credential as default argument in MCP tool handler
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
    patterns:
      - pattern: |
          async def $FUNC(..., $PARAM="$VALUE", ...):
              ...
      - metavariable-regex:
          metavariable: $PARAM
          regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{8,}
