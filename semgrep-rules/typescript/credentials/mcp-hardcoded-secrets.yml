rules:
  - id: mcp-ts-hardcoded-api-key
    message: >
      Hardcoded credential in TypeScript MCP server. API keys, secrets, tokens,
      and passwords must not be embedded in source code — use environment
      variables (process.env.MY_API_KEY) or a secrets manager instead.
    severity: ERROR
    languages: [typescript, javascript]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp-top-10:
        - MCP01
      description: Hardcoded credential in TypeScript MCP server
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
    patterns:
      - pattern: const $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{20,}

  - id: mcp-ts-hardcoded-api-key-let
    message: >
      Hardcoded credential in TypeScript MCP server. API keys, secrets, tokens,
      and passwords must not be embedded in source code — use environment
      variables (process.env.MY_API_KEY) instead.
    severity: ERROR
    languages: [typescript, javascript]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp-top-10:
        - MCP01
      description: Hardcoded credential (let/var) in TypeScript MCP server
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
    patterns:
      - pattern: let $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{20,}
