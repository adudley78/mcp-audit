rules:
  - id: mcp-ts-credential-default-param
    message: >
      Hardcoded credential value used as a default parameter in a TypeScript MCP
      handler function. Default parameter values are visible in source code and
      stack traces — use process.env.PARAM_NAME as the default or require the
      value to be injected at construction time.
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: credentials
      cwe: CWE-798
      owasp: A07:2021
      owasp-mcp-top-10:
        - MCP01
      description: Hardcoded credential as default parameter in TypeScript MCP handler
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      fp-guidance: >
        Fires when a parameter whose name matches a credential pattern has a
        non-trivial string literal default. Suppress with
        // nosemgrep: mcp-ts-credential-default-param when the value is a
        non-sensitive placeholder such as an empty string or "none".
    pattern-either:
      - patterns:
          - pattern: function $FUNC(..., $PARAM = "$VALUE", ...) { ... }
          - metavariable-regex:
              metavariable: $PARAM
              regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
          - metavariable-regex:
              metavariable: $VALUE
              regex: .{8,}
      - patterns:
          - pattern: async function $FUNC(..., $PARAM = "$VALUE", ...) { ... }
          - metavariable-regex:
              metavariable: $PARAM
              regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
          - metavariable-regex:
              metavariable: $VALUE
              regex: .{8,}
      - patterns:
          - pattern: const $FUNC = (..., $PARAM = "$VALUE", ...) => { ... }
          - metavariable-regex:
              metavariable: $PARAM
              regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
          - metavariable-regex:
              metavariable: $VALUE
              regex: .{8,}
      - patterns:
          - pattern: const $FUNC = async (..., $PARAM = "$VALUE", ...) => { ... }
          - metavariable-regex:
              metavariable: $PARAM
              regex: (?i)(api_?key|access_?key|secret_?key|secret|token|password|passwd|auth_?token|private_?key)
          - metavariable-regex:
              metavariable: $VALUE
              regex: .{8,}
