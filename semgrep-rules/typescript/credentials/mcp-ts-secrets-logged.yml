rules:
  - id: mcp-ts-console-log-sensitive
    message: >
      Sensitive variable name passed to console.log(), console.debug(), or
      console.warn(). If the variable holds an API key, token, or password,
      this writes the credential to stdout and server logs where it may be
      captured by log aggregators or crash reporters. Log a redacted value
      or a non-sensitive summary instead.
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: credentials
      cwe: CWE-532
      owasp: A09:2021
      owasp-mcp-top-10:
        - MCP01
      description: Sensitive identifier passed to console — credential exposure in logs
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      fp-guidance: >
        Fires on identifier name matching a credential pattern, not on string
        content. Suppress with // nosemgrep: mcp-ts-console-log-sensitive when
        the variable name is credential-like but the value is not sensitive
        (e.g. a boolean isTokenValid).
    patterns:
      - pattern-either:
          - pattern: console.log($X)
          - pattern: console.debug($X)
          - pattern: console.warn($X)
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(key|token|secret|password|passwd|auth|credential).*
      - pattern-not: console.log("...")
      - pattern-not: console.debug("...")
      - pattern-not: console.warn("...")

  - id: mcp-ts-console-error-sensitive
    message: >
      Sensitive variable name passed to console.error(). If the variable holds
      an API key, token, or password, this writes the credential to stderr and
      server logs where it may be captured by log aggregators. Return a generic
      error message and log a redacted value instead.
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: credentials
      cwe: CWE-532
      owasp: A09:2021
      owasp-mcp-top-10:
        - MCP01
      description: Sensitive identifier passed to console.error — credential exposure in logs
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      fp-guidance: >
        Fires on identifier name matching a credential pattern, not on string
        content. Suppress with // nosemgrep: mcp-ts-console-error-sensitive
        when the variable name is credential-like but the value is not sensitive.
    patterns:
      - pattern: console.error($X)
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(key|token|secret|password|passwd|auth|credential).*
      - pattern-not: console.error("...")
