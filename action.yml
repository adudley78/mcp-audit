name: 'mcp-audit'
description: 'Security scanner for MCP server configurations — detects prompt injection, supply chain risks, credential exposure, and more.'
author: 'Adam Dudley'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  config-paths:
    description: >
      Space-separated list of paths to MCP config files or directories to scan.
      Defaults to auto-discovery (scans all known client config locations).
    required: false
    default: ''

  severity-threshold:
    description: 'Minimum severity to fail the build. One of: critical, high, medium, low, info.'
    required: false
    default: 'high'

  sarif-output:
    description: 'Path to write SARIF output file. Set to empty string to skip SARIF generation.'
    required: false
    default: 'mcp-audit.sarif'

  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning automatically. Requires security-events: write permission.'
    required: false
    default: 'true'

  check-vulns:
    description: 'Run OSV.dev dependency vulnerability scan (Layer 3). Requires network access.'
    required: false
    default: 'false'

  verify-signatures:
    description: 'Run Sigstore signature verification (Layer 2). Requires network access.'
    required: false
    default: 'false'

  run-sast:
    description: 'Also run mcp-audit SAST analysis against the path specified by sast-path.'
    required: false
    default: 'false'

  sast-path:
    description: 'Path to run SAST analysis against. Only used when run-sast is true. Defaults to src/.'
    required: false
    default: 'src/'

  baseline-name:
    description: >
      Name of a saved baseline to compare against. When set, the action runs
      `mcp-audit baseline compare <baseline-name>` after the scan and posts the
      diff as a step summary. Leave empty to skip baseline comparison.
    required: false
    default: ''

  fail-on-findings:
    description: 'Fail the workflow step if findings meet or exceed severity-threshold. Set to false to report only.'
    required: false
    default: 'true'

  version:
    description: 'mcp-audit-scanner version to install. Defaults to latest.'
    required: false
    default: 'latest'

outputs:
  findings-count:
    description: 'Total number of findings at or above the severity threshold.'
    value: ${{ steps.scan.outputs.findings-count }}
  grade:
    description: 'Overall scan grade (A–F).'
    value: ${{ steps.scan.outputs.grade }}
  sarif-path:
    description: 'Absolute path to the generated SARIF file (empty if sarif-output was empty).'
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install mcp-audit
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install mcp-audit-scanner --quiet
        else
          pip install "mcp-audit-scanner==${{ inputs.version }}" --quiet
        fi

    - name: Run mcp-audit scan
      id: scan
      shell: bash
      env:
        SARIF_OUTPUT: ${{ inputs.sarif-output }}
        CONFIG_PATHS: ${{ inputs.config-paths }}
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        CHECK_VULNS: ${{ inputs.check-vulns }}
        VERIFY_SIGNATURES: ${{ inputs.verify-signatures }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set +e

        SCAN_EXIT=0

        # ── SARIF pass ────────────────────────────────────────────────────────
        if [ -n "$SARIF_OUTPUT" ]; then
          SARIF_ARGS=(scan)
          if [ -n "$CONFIG_PATHS" ]; then
            # shellcheck disable=SC2086
            SARIF_ARGS+=($CONFIG_PATHS)
          fi
          SARIF_ARGS+=(--format sarif --output "$SARIF_OUTPUT")
          SARIF_ARGS+=(--severity-threshold "$SEVERITY_THRESHOLD")
          [ "$CHECK_VULNS" = "true" ]       && SARIF_ARGS+=(--check-vulns)
          [ "$VERIFY_SIGNATURES" = "true" ] && SARIF_ARGS+=(--verify-signatures)

          mcp-audit "${SARIF_ARGS[@]}"
          SCAN_EXIT=$?

          if [ -f "$SARIF_OUTPUT" ]; then
            {
              echo "sarif-path=$(python3 -c 'import os,sys;print(os.path.abspath(sys.argv[1]))' "$SARIF_OUTPUT")"
            } >> "$GITHUB_OUTPUT"

            FINDINGS=$(python3 -c "
        import json, os, sys
        try:
            sarif = json.load(open(os.environ['SARIF_OUTPUT']))
            results = sarif.get('runs', [{}])[0].get('results', [])
            print(len(results))
        except Exception:
            print(0)
        ")
            echo "findings-count=${FINDINGS:-0}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "sarif-path="
              echo "findings-count=0"
            } >> "$GITHUB_OUTPUT"
          fi
        else
          {
            echo "sarif-path="
            echo "findings-count=0"
          } >> "$GITHUB_OUTPUT"
        fi

        # ── JSON pass — capture grade only ───────────────────────────────────
        JSON_TMP=$(mktemp /tmp/mcp-audit-XXXXXX.json)
        JSON_ARGS=(scan)
        if [ -n "$CONFIG_PATHS" ]; then
          # shellcheck disable=SC2086
          JSON_ARGS+=($CONFIG_PATHS)
        fi
        JSON_ARGS+=(--format json --output "$JSON_TMP")
        JSON_ARGS+=(--severity-threshold "$SEVERITY_THRESHOLD")
        [ "$CHECK_VULNS" = "true" ]       && JSON_ARGS+=(--check-vulns)
        [ "$VERIFY_SIGNATURES" = "true" ] && JSON_ARGS+=(--verify-signatures)

        mcp-audit "${JSON_ARGS[@]}" >/dev/null 2>&1
        JSON_EXIT=$?

        GRADE=$(JSON_TMP="$JSON_TMP" python3 -c "
        import json, os
        try:
            data = json.load(open(os.environ['JSON_TMP']))
            grade = (data.get('grade')
                     or (data.get('score') or {}).get('grade')
                     or (data.get('summary') or {}).get('grade')
                     or 'unknown')
            print(grade)
        except Exception:
            print('unknown')
        ")
        echo "grade=${GRADE:-unknown}" >> "$GITHUB_OUTPUT"
        rm -f "$JSON_TMP"

        # Fallback: if the SARIF pass was disabled (empty sarif-output) we still
        # want the JSON pass exit code to drive fail-on-findings. When both run,
        # the SARIF exit code wins because it is the primary source of truth.
        if [ -z "$SARIF_OUTPUT" ]; then
          SCAN_EXIT=$JSON_EXIT
        fi

        set -e

        # Exit code 2 is always a tool error — propagate regardless of fail-on-findings.
        if [ "$SCAN_EXIT" -eq 2 ]; then
          exit 2
        fi

        # Exit code 1 means findings at or above the threshold — honour fail-on-findings.
        if [ "$FAIL_ON_FINDINGS" = "true" ] && [ "$SCAN_EXIT" -ne 0 ]; then
          exit "$SCAN_EXIT"
        fi

    - name: Run mcp-audit SAST
      if: inputs.run-sast == 'true'
      shell: bash
      # Semgrep is not bundled in `mcp-audit-scanner` — it is a ~15 MB
      # dependency that would bloat the wheel and PyInstaller binary for
      # every user, even the 95% that never run SAST.  We install it here,
      # inside the optional `run-sast` step, so the cost only applies when
      # the user opts in.
      #
      # IMPORTANT: Install into an isolated environment via `pipx`, not the
      # same environment as `mcp-audit-scanner`.  Semgrep pins `click<8.2`,
      # while `typer>=0.24` (a direct mcp-audit dep) requires `click>=8.2.1`.
      # A plain `pip install semgrep` downgrades click and breaks `mcp-audit`
      # at import time with `TypeError: type 'Choice' is not subscriptable`.
      # `pipx` ships pre-installed on every GitHub-hosted Ubuntu runner and
      # puts the `semgrep` binary on PATH without touching our deps.
      run: |
        pipx install semgrep
        mcp-audit sast "${{ inputs.sast-path }}"

    - name: Compare baseline
      if: inputs.baseline-name != ''
      shell: bash
      run: |
        # `baseline compare` takes the baseline name as a positional argument.
        mcp-audit baseline compare "${{ inputs.baseline-name }}" | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && inputs.sarif-output != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: mcp-audit
      # continue-on-error is intentional: Code Scanning may not be enabled on
      # every repo that uses this action (private repos without GHAS, etc.).
      # A hard failure here would be confusing — the scan itself already ran.
      continue-on-error: true
