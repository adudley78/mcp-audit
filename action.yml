name: mcp-audit
description: Scan MCP server configurations for security vulnerabilities
author: Adam Dudley

inputs:
  severity-threshold:
    description: >
      Fail the build if findings at or above this severity are found.
      Accepted values: critical, high, medium, low, info
    required: false
    default: 'high'

  format:
    description: >
      Output format for scan results.
      Accepted values: sarif, json, terminal
    required: false
    default: 'sarif'

  config-paths:
    description: >
      Single MCP config file path to scan.
      Leave empty to auto-discover across all supported clients.
    required: false
    default: ''

  baseline:
    description: >
      Baseline name to compare against for drift detection.
      Leave empty to skip baseline comparison.
    required: false
    default: ''

  upload-sarif:
    description: Upload SARIF results to GitHub Security tab
    required: false
    default: 'true'

outputs:
  finding-count:
    description: Total number of findings
    value: ${{ steps.scan.outputs.finding-count }}

  grade:
    description: Letter grade for the scanned configuration (A–F)
    value: ${{ steps.scan.outputs.grade }}

  sarif-path:
    description: Path to generated SARIF file
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: composite
  steps:
    - name: Install mcp-audit
      shell: bash
      run: pip install mcp-audit

    - name: Run mcp-audit scan
      shell: bash
      id: scan
      run: |
        ARGS="--format sarif --output-file mcp-audit-results.sarif"
        ARGS="$ARGS --severity-threshold ${{ inputs.severity-threshold }}"

        if [ -n "${{ inputs.config-paths }}" ]; then
          ARGS="$ARGS --path ${{ inputs.config-paths }}"
        fi

        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS="$ARGS --baseline ${{ inputs.baseline }}"
        fi

        # Capture exit code without failing the step immediately.
        # Exit 1 = findings found (expected; job continues).
        # Exit 2 = tool error (propagated as a real failure).
        mcp-audit scan $ARGS || SCAN_EXIT=$?

        if [ "${SCAN_EXIT:-0}" -eq 2 ]; then
          exit 2
        fi

        echo "sarif-path=mcp-audit-results.sarif" >> "$GITHUB_OUTPUT"
        echo "scan_exit=${SCAN_EXIT:-0}" >> "$GITHUB_OUTPUT"

        # Parse finding count and grade directly from the SARIF output.
        python3 - << 'PYEOF'
        import json, os, sys
        sarif_path = "mcp-audit-results.sarif"
        try:
            with open(sarif_path) as f:
                data = json.load(f)
            runs = data.get("runs", [{}])
            results = runs[0].get("results", []) if runs else []
            props = runs[0].get("properties", {}) if runs else {}
            grade = props.get("mcp-audit/grade", "N/A")
            count = len(results)
            github_output = os.environ.get("GITHUB_OUTPUT", "")
            if github_output:
                with open(github_output, "a") as out:
                    out.write(f"finding-count={count}\n")
                    out.write(f"grade={grade}\n")
        except Exception as e:
            print(f"Warning: could not parse SARIF: {e}", file=sys.stderr)
        PYEOF

    - name: Verify SARIF output
      shell: bash
      if: always()
      run: |
        if [ ! -f "mcp-audit-results.sarif" ]; then
          echo "SARIF file not found — writing empty SARIF so upload does not fail"
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"mcp-audit","rules":[]}},"results":[]}]}' \
            > mcp-audit-results.sarif
        fi

    - name: Upload SARIF to GitHub Security tab
      if: always() && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: mcp-audit-results.sarif
        category: mcp-audit

    - name: Write job summary
      shell: bash
      if: always()
      run: |
        python3 - << 'PYEOF'
        import json, os, sys

        sarif_path = "mcp-audit-results.sarif"
        try:
            with open(sarif_path) as f:
                data = json.load(f)

            runs = data.get("runs", [{}])
            results = runs[0].get("results", []) if runs else []
            props = runs[0].get("properties", {}) if runs else {}

            grade = props.get("mcp-audit/grade", "N/A")
            numeric = props.get("mcp-audit/numericScore", "N/A")

            # SARIF levels: error → CRITICAL/HIGH, warning → MEDIUM, note → LOW/INFO
            severity_counts = {"error": 0, "warning": 0, "note": 0, "none": 0}
            for r in results:
                level = r.get("level", "warning")
                severity_counts[level] = severity_counts.get(level, 0) + 1

            table_header = "| Grade | Score | Errors | Warnings | Notes |"
            table_sep    = "|-------|-------|--------|----------|-------|"
            table_row    = (
                f"| {grade} | {numeric}/100 "
                f"| {severity_counts['error']} "
                f"| {severity_counts['warning']} "
                f"| {severity_counts['note']} |"
            )
            summary = (
                "## mcp-audit Security Scan\n\n"
                + table_header + "\n"
                + table_sep + "\n"
                + table_row + "\n\n"
            )

            if results:
                summary += "### Findings\n\n"
                summary += "| Level | Rule | Message |\n"
                summary += "|-------|------|----------|\n"
                for r in results[:20]:
                    level = r.get("level", "")
                    rule_id = r.get("ruleId", "")
                    message = r.get("message", {}).get("text", "")[:120]
                    summary += f"| {level} | {rule_id} | {message} |\n"
                if len(results) > 20:
                    summary += f"\n_…and {len(results) - 20} more findings._\n"
            else:
                summary += "_No findings — configuration looks clean._\n"

            step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
            if step_summary:
                with open(step_summary, "a") as f:
                    f.write(summary)
            else:
                print(summary)

        except FileNotFoundError:
            msg = "mcp-audit-results.sarif not found — scan may have produced no output.\n"
            step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
            if step_summary:
                with open(step_summary, "a") as f:
                    f.write(f"## mcp-audit Security Scan\n\n{msg}")
            else:
                print(msg, file=sys.stderr)
        except Exception as e:
            print(f"Summary generation failed: {e}", file=sys.stderr)
        PYEOF
