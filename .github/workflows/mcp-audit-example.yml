name: MCP Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  mcp-audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run mcp-audit
        # Pin to a published release tag.  Switch to `@v1` once a major v1.x
        # release exists on GitHub Marketplace (the `v1` ref will then track
        # the latest 1.x release automatically).
        uses: adudley78/mcp-audit@v0.3.3
        with:
          severity-threshold: high
          upload-sarif: 'true'

  # Optional SAST job — uncomment to run MCP-specific Semgrep rules alongside
  # the config scan. The action installs Semgrep automatically when
  # `run-sast: 'true'` is set — no extra step is required.
  # mcp-audit-sast:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     security-events: write
  #     contents: read
  #
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Run mcp-audit with SAST
  #       uses: adudley78/mcp-audit@v0.3.3
  #       with:
  #         run-sast: 'true'
  #         sast-path: 'src/'
  #         severity-threshold: medium
  #         upload-sarif: 'true'
