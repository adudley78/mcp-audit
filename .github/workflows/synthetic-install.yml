name: Synthetic Install Integration Tests

# Validate discover → scan → baseline against realistic per-OS fixture trees,
# including paths with spaces, non-ASCII filenames, and Windows >260-char paths.

on:
  push:
  pull_request:

jobs:
  synthetic-install:
    name: Synthetic install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run integration tests
        # PYTHONUTF8=1 ensures consistent UTF-8 handling on Windows where
        # the default console codepage (cp1252) would otherwise mangle
        # non-ASCII path strings in subprocess output.
        env:
          PYTHONUTF8: "1"
          PYTHONUNBUFFERED: "1"
        run: pytest tests/integration/ -v --tb=short
