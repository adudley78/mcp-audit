name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13 was retired by GitHub on 2025-12-08. ``macos-15-intel``
          # is the replacement x86_64 runner label and is supported through
          # 2027-08. After that, Actions drops x86_64 macOS entirely and this
          # matrix leg will need to go (Apple Silicon Macs run our x86_64
          # binary transparently via Rosetta in the meantime).
          - os: macos-15-intel
            target: darwin-x86_64
            spec: mcp-audit-darwin-x86_64.spec
            binary: mcp-audit-darwin-x86_64
          - os: macos-latest
            target: darwin-arm64
            spec: mcp-audit-darwin-arm64.spec
            binary: mcp-audit-darwin-arm64
          - os: ubuntu-latest
            target: linux-x86_64
            spec: mcp-audit-linux-x86_64.spec
            binary: mcp-audit-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            spec: mcp-audit-windows-x86_64.spec
            binary: mcp-audit-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # sigstore is installed into .venv so `uv sync --all-extras` resolves,
        # but the four PyInstaller specs explicitly `excludes=[...]` sigstore
        # and its transitive modules, so it is never bundled into the binary.
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build binary
        run: uv run pyinstaller ${{ matrix.spec }} --distpath dist/

      - name: Smoke test — version
        run: dist/${{ matrix.binary }} version
        shell: bash

      - name: Smoke test — full end-to-end
        # `uv run python` pins the interpreter to the uv-managed .venv so the
        # step does not depend on whatever `python` happens to be on PATH.
        run: uv run python scripts/smoke_test.py dist/${{ matrix.binary }}
        shell: bash

      - name: Binary size check
        shell: bash
        run: |
          BINARY="dist/${{ matrix.binary }}"
          SIZE_BYTES=$(wc -c < "$BINARY" | tr -d ' ')
          # `bc` is not installed in Windows' Git Bash; awk is universally
          # available on every runner, so use it for the MB float format.
          SIZE_MB=$(awk -v b="$SIZE_BYTES" 'BEGIN { printf "%.1f", b/1048576 }')
          echo "Binary size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          # Warn at 25 MB, fail at 35 MB.  The binary ships *without* sigstore
          # (excluded in the .spec files); local linux build is ~21 MB.
          if [ "$SIZE_BYTES" -gt 36700160 ]; then   # 35 MB
            echo "ERROR: binary exceeds 35 MB hard limit (${SIZE_MB} MB)" >&2
            exit 1
          elif [ "$SIZE_BYTES" -gt 26214400 ]; then  # 25 MB
            echo "WARNING: binary exceeds 25 MB soft limit (${SIZE_MB} MB)"
          else
            echo "OK: binary is within size target"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Compose release notes from template
        # Substitutes {{VERSION}} with the pushed git tag (e.g. v0.3.4) so
        # the body Quick-start example and the "What's new in" header both
        # point at a real, resolvable ref — not a floating `@v0` / `@v1`
        # that doesn't exist yet.  Output is a plain markdown file that
        # softprops passes through verbatim via `body_path:`.
        run: |
          sed "s|{{VERSION}}|${GITHUB_REF_NAME}|g" \
            .github/release-notes-template.md \
            > "${RUNNER_TEMP}/release-notes.md"

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          # Prefer the hand-curated template in .github/ over GitHub's
          # auto-generated PR list — Marketplace visitors landing on the
          # release page deserve install/usage instructions, not a diff of
          # dependabot bumps.  The PR list is still accessible via the
          # "Full Changelog" link appended by GitHub's comparison view.
          body_path: ${{ runner.temp }}/release-notes.md

  publish-pypi:
    name: Publish to PyPI
    # Runs independently of the `release` job — a transient PyPI outage must
    # not withhold the GitHub Release binaries, and vice versa.  Both still
    # depend on `build` so a broken build never publishes anywhere.
    needs: build
    runs-on: ubuntu-latest

    # Bound to the `pypi` Environment so PyPI's Trusted Publisher OIDC claim
    # can scope the issued token to *this specific environment* (defence in
    # depth against a forked workflow trying to impersonate the release
    # pipeline).  Create the environment once via Settings → Environments.
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-audit-scanner

    permissions:
      # `id-token: write` is required for PyPI Trusted Publishing (OIDC).
      # We deliberately do NOT grant `contents: write` here — this job has
      # no reason to touch repository content.
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist + wheel
        # Pure-Python project (hatchling backend), so `uv build` produces a
        # single platform-agnostic wheel plus an sdist.  No matrix needed.
        run: |
          rm -rf dist/
          uv build

      - name: Publish to PyPI
        # Pinned to the v1.14.0 commit SHA (2026-04-07) for supply-chain
        # hardening — `release/v1` is a floating branch that could be moved
        # to a future malicious commit without our knowledge.  Bump the SHA
        # deliberately when picking up a new upstream release and audit the
        # diff at https://github.com/pypa/gh-action-pypi-publish/compare.
        #
        # `attestations: true` enables PEP 740 provenance attestations —
        # sigstore-signed statements that bind *these specific artefacts*
        # to *this specific workflow run*.  PyPI surfaces them on the
        # project page.  For a security-scanner project this is a
        # non-negotiable best practice.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true

  report:
    name: Release Summary
    needs: [build, release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Post binary size summary
        run: |
          echo "## Binary sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/**/*; do
            if [ -f "$f" ]; then
              SIZE=$(du -sh "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
        shell: bash
