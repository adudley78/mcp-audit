name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: darwin-x86_64
            spec: mcp-audit-darwin-x86_64.spec
            binary: mcp-audit-darwin-x86_64
          - os: macos-latest
            target: darwin-arm64
            spec: mcp-audit-darwin-arm64.spec
            binary: mcp-audit-darwin-arm64
          - os: ubuntu-latest
            target: linux-x86_64
            spec: mcp-audit-linux-x86_64.spec
            binary: mcp-audit-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            spec: mcp-audit-windows-x86_64.spec
            binary: mcp-audit-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build binary
        run: uv run pyinstaller ${{ matrix.spec }} --distpath dist/

      - name: Smoke test binary
        run: dist/${{ matrix.binary }} version
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
