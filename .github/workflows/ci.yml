name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Install Playwright browsers
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          uv pip install playwright --system
          python -m playwright install chromium firefox webkit
          python -m playwright install-deps

      - name: Run tests
        run: pytest tests/ -x -q

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  test-all-extras:
    name: Test all optional extras (ubuntu, 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install all optional extras
        # The default `test` matrix only installs `[dev]`, so anything gated
        # on `cyclonedx-python-lib`, `sigstore`, `mcp`, or `httpx` would
        # silently skip (nine SBOM tests plus the attestation / live-MCP
        # paths).  This job wires the full optional stack so those code
        # paths are actually exercised on every PR.
        run: uv pip install -e ".[dev,sbom,attestation,mcp]" --system

      - name: Run tests
        run: pytest tests/ -x -q

      - name: Verify test-count docs in sync
        # Runs in this job (all optional extras installed) so the collected
        # count matches the full 1,391-test baseline written into the docs.
        # The script uses sys.executable so it queries the same environment
        # that just ran the tests, not a fresh uv venv.
        run: python scripts/update_test_count.py --check

  binary-smoke:
    name: Binary smoke test (ubuntu)
    runs-on: ubuntu-latest
    # Only run on PRs and pushes to main — skip for every branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        # The binary ships *without* the optional [attestation] extra: the
        # sigstore stack adds ~15 MB and would push the binary over the 35 MB
        # budget enforced below.  `--verify-signatures` gracefully degrades
        # to a friendly error when sigstore isn't importable (see
        # src/mcp_audit/cli/scan.py).  Users who want attestation verification
        # should `pip install 'mcp-audit-scanner[attestation]'` instead.
        run: uv pip install -e ".[dev]" --system

      - name: Install PyInstaller
        run: uv pip install pyinstaller --system

      - name: Build Linux binary
        run: uv run pyinstaller mcp-audit-linux-x86_64.spec --distpath dist/

      - name: Run smoke test
        run: python scripts/smoke_test.py dist/mcp-audit-linux-x86_64

      - name: Check binary size
        run: |
          SIZE_BYTES=$(wc -c < dist/mcp-audit-linux-x86_64 | tr -d ' ')
          SIZE_MB=$(echo "scale=1; $SIZE_BYTES / 1048576" | bc)
          echo "Linux binary: ${SIZE_MB} MB"
          if [ "$SIZE_BYTES" -gt 36700160 ]; then
            echo "ERROR: binary exceeds 35 MB hard limit" >&2
            exit 1
          fi

  source-smoke:
    name: Source smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Only run on PRs and pushes to main — skip for every branch push.
    # Ubuntu is covered by binary-smoke above; this job adds watcher/rug-pull/
    # canonical-path coverage on both Ubuntu and Windows without the cost of a
    # PyInstaller build.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run source smoke test
        # Pass "uv run mcp-audit" as the multi-word binary invocation so the
        # smoke test uses the installed source package rather than a built binary.
        # On Windows the entry-point script may not be on PATH after --system
        # install; "uv run" resolves the entry point reliably on all platforms.
        run: python scripts/smoke_test.py uv run mcp-audit
