# Minimal mcp-audit pre-commit integration.
# Fires whenever a JSON file is staged; fails the commit if any HIGH or
# CRITICAL findings are detected in your MCP server configurations.
#
# Replace `rev` with the latest release tag from:
# https://github.com/adudley78/mcp-audit/releases
repos:
  - repo: https://github.com/adudley78/mcp-audit
    rev: v0.1.0  # Replace with the latest release tag
    hooks:
      - id: mcp-audit
