# Drift detection — compare the current scan against a saved baseline named
# "ci-baseline". Any deviation (server added/removed, description changed)
# appears as a DriftFinding alongside normal security findings.
#
# Setup:
#   1. Run `mcp-audit baseline save ci-baseline` locally.
#   2. Commit the exported baseline to the repo:
#        mcp-audit baseline export ci-baseline > .mcp-audit-baseline.json
#        git add .mcp-audit-baseline.json && git commit -m "chore: add mcp-audit baseline"
#   3. On CI, restore it into the baselines directory before the action runs
#      (the action uses the user-config baseline store; it does not import
#      a committed file automatically).
#
# Good for: tracking intentional config changes, detecting unauthorised server additions.

name: MCP Security Scan (with baseline drift detection)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  mcp-audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Restore the committed baseline so drift detection has a reference point.
      # The action looks up baselines from `~/.config/mcp-audit/baselines/<name>.json`
      # on Linux runners; adjust the target path for other platforms.
      - name: Load baseline
        shell: bash
        run: |
          if [ -f .mcp-audit-baseline.json ]; then
            mkdir -p "$HOME/.config/mcp-audit/baselines"
            cp .mcp-audit-baseline.json "$HOME/.config/mcp-audit/baselines/ci-baseline.json"
          fi

      - name: Run mcp-audit with drift detection
        uses: adudley78/mcp-audit@v0.3.3
        with:
          severity-threshold: high
          baseline-name: ci-baseline
          upload-sarif: 'true'
